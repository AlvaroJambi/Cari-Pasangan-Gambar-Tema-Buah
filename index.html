<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tebak Gambar Buah</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-image: url('Gemini_Generated_Image_u2iegfu2iegfu2ie.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; flex-direction: column; align-items: center; padding: 20px; 
            color: #333; min-height: 100vh; margin: 0;
        }
        .container { background: rgba(255, 255, 255, 0.85); padding: 20px; border-radius: 30px; text-align: center; }
        h1 { margin-bottom: 5px; color: #ff4757; text-transform: uppercase; }
        .stats-container { display: flex; gap: 15px; margin-bottom: 20px; justify-content: center; }
        .stat-box { border: 3px solid #333; border-radius: 20px; padding: 10px 20px; text-align: center; width: 80px; background: white; }
        .grid { display: grid; grid-template-columns: repeat(4, 70px); gap: 10px; background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 20px; border: 3px solid #333; }
        .card { width: 70px; height: 70px; background: linear-gradient(135deg, #ff9f43, #ff6b6b); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; color: white; border: 2px solid #fff; }
        .card.flipped { background: white; color: #333; border: 2px solid #ff9f43; }
        
        /* CSS untuk Confetti sederhana */
        .confetti { position: fixed; top: -50px; font-size: 20px; animation: fall 2s linear; }
        @keyframes fall { to { transform: translateY(100vh); } }

        .popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        button { padding: 15px 30px; font-size: 18px; border-radius: 30px; border: none; background: #ff4757; color: white; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <audio id="music" src="Musik.mp3" loop></audio>
    <audio id="soundSalah" src="Sound Salah.mpeg"></audio>

    <div class="container">
        <h1>TEBAK GAMBAR BUAH</h1>
        <div class="stats-container">
            <div class="stat-box"><span>LANGKAH</span><div id="moves">0</div></div>
            <div class="stat-box"><span>COCOK</span><div id="matches">0/8</div></div>
            <div class="stat-box"><span>WAKTU</span><div id="timer">0:00</div></div>
        </div>
        <div class="grid" id="gameGrid"></div>
    </div>

    <div class="popup" id="popup">
        <h1>🎊 Hebat 🎊</h1>
        <button id="btnMainLagi">Main Lagi</button>
    </div>

    <script>
        const music = document.getElementById('music');
        const sSalah = document.getElementById('soundSalah');
        const grid = document.getElementById('gameGrid');
        
        // Fungsi untuk trigger musik setelah klik pertama
        function enableMusic() {
            music.play();
            document.removeEventListener('click', enableMusic);
        }
        document.addEventListener('click', enableMusic);

        function triggerConfetti() {
            for (let i = 0; i < 20; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.innerText = '✨';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.animationDelay = Math.random() + 's';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 2000);
            }
        }

        function startGame() {
            grid.innerHTML = '';
            let fruits = ['🍎', '🍎', '🍌', '🍌', '🍇', '🍇', '🍓', '🍓', '🍍', '🍍', '🍒', '🍒', '🥝', '🥝', '🍉', '🍉'].sort(() => Math.random() - 0.5);
            let flipped = [], matches = 0, moves = 0;
            document.getElementById('popup').style.display = 'none';

            fruits.forEach(f => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = '?';
                card.onclick = function() {
                    if (flipped.length < 2 && !this.classList.contains('flipped')) {
                        this.classList.add('flipped');
                        this.innerHTML = f;
                        flipped.push(this);
                        if (flipped.length === 2) {
                            if (flipped[0].innerHTML === flipped[1].innerHTML) {
                                matches++; triggerConfetti(); flipped = [];
                            } else {
                                sSalah.play();
                                setTimeout(() => { flipped.forEach(c => { c.classList.remove('flipped'); c.innerHTML = '?'; }); flipped = []; }, 800);
                            }
                        }
                    }
                };
                grid.appendChild(card);
            });
        }

        document.getElementById('btnMainLagi').onclick = startGame;
        startGame();
    </script>
</body>
</html>
