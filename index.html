<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tebak Gambar Buah</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
        
        h1 { margin-bottom: 5px; color: #ff4757; text-transform: uppercase; }
        .subtitle { margin-bottom: 20px; font-weight: bold; }

        .stats-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-box { border: 3px solid #333; border-radius: 20px; padding: 10px 20px; text-align: center; width: 80px; }
        .stat-box span { display: block; font-size: 0.8rem; font-weight: bold; color: #ff4757; }
        .stat-box div { font-size: 1.2rem; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(4, 70px); gap: 10px; background: #eee; padding: 15px; border-radius: 20px; border: 3px solid #333; }
        .card { width: 70px; height: 70px; background: linear-gradient(135deg, #ff9f43, #ff6b6b); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; color: white; border: 2px solid #fff; }
        .card.flipped { background: white; color: #333; border: 2px solid #ff9f43; }

        .popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        button { padding: 15px 30px; font-size: 18px; border-radius: 30px; border: none; background: #ff4757; color: white; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>TEBAK GAMBAR BUAH</h1>
    <p class="subtitle">Cocokkan pasangan buah yang sama!</p>

    <div class="stats-container">
        <div class="stat-box"><span>LANGKAH</span><div id="moves">0</div></div>
        <div class="stat-box"><span>COCOK</span><div id="matches">0/8</div></div>
        <div class="stat-box"><span>WAKTU</span><div id="timer">0:00</div></div>
    </div>

    <div class="grid" id="gameGrid"></div>

    <div class="popup" id="popup">
        <h1>🎊 Hebat 🎊</h1>
        <p>Kamu Berhasil Mencocokkan Semua Kartu</p>
        <button onclick="startGame()">Main Lagi</button>
    </div>

    <script>
        const grid = document.getElementById('gameGrid');
        const movesDisplay = document.getElementById('moves');
        const matchesDisplay = document.getElementById('matches');
        const timerDisplay = document.getElementById('timer');
        const fruits = ['🍎', '🍎', '🍌', '🍌', '🍇', '🍇', '🍓', '🍓', '🍍', '🍍', '🍒', '🍒', '🥝', '🥝', '🍉', '🍉'];
        let cards = [], flippedCards = [], moves = 0, matches = 0, time = 0, timerInterval;

        function startGame() {
            grid.innerHTML = '';
            cards = [...fruits].sort(() => Math.random() - 0.5);
            flippedCards = []; moves = 0; matches = 0; time = 0;
            movesDisplay.innerText = 0; matchesDisplay.innerText = "0/8"; timerDisplay.innerText = "0:00";
            document.getElementById('popup').style.display = 'none';
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                time++;
                let m = Math.floor(time / 60);
                let s = time % 60;
                timerDisplay.innerText = `${m}:${s < 10 ? '0'+s : s}`;
            }, 1000);

            cards.forEach((fruit, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.innerHTML = '?';
                card.dataset.fruit = fruit;
                card.addEventListener('click', function() {
                    if (flippedCards.length < 2 && !this.classList.contains('flipped')) {
                        this.classList.add('flipped');
                        this.innerHTML = this.dataset.fruit;
                        flippedCards.push(this);
                        if (flippedCards.length === 2) {
                            moves++; movesDisplay.innerText = moves;
                            if (flippedCards[0].dataset.fruit === flippedCards[1].dataset.fruit) {
                                matches++; matchesDisplay.innerText = `${matches}/8`;
                                flippedCards = [];
                                if (matches === 8) document.getElementById('popup').style.display = 'flex';
                            } else {
                                setTimeout(() => {
                                    flippedCards.forEach(c => { c.classList.remove('flipped'); c.innerHTML = '?'; });
                                    flippedCards = [];
                                }, 800);
                            }
                        }
                    }
                });
                grid.appendChild(card);
            });
        }
        startGame();
    </script>
</body>
</html>
